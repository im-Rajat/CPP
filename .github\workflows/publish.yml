name: publish
on:
  push:
    branches:
      - main 

# Strict permissions required for artifact deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevents multiple pipelines from trying to deploy at the exact same time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV 
      
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
            
      - run: pip install mkdocs-material 
      
      # Retaining our folder hack to keep the root directory clean
      - name: Hack to fix the folder structure dynamically
        run: |
          mkdir docs
          rsync -av --exclude='docs' --exclude='.git' --exclude='.github' --exclude='mkdocs.yml' ./ docs/
          
      # Build the static HTML files into the default 'site/' folder
      - run: mkdocs build
      
      # Package the 'site/' folder into an artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
