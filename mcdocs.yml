site_name: Rajat's C++ Notes
site_url: https://im-rajat.github.io/CPP/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant      # Prevents full page reloads
    - navigation.indexes
    # - navigation.tracking     # Updates the URL hash as you scroll
    - search.suggest
    - search.highlight
    - content.code.copy       # Critical for your C++/Java notes
  
  # Adds a Light/Dark mode toggle (Developers expect this)
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

docs_dir: 'docs'

markdown_extensions:
  - tables
  - sane_lists
  - admonition
  - attr_list                 # Allows you to resize images directly in markdown: ![img](file.png){ width="300" }
  - md_in_html                # Allows markdown to work inside raw HTML tags
  - pymdownx.details          # Creates collapsible dropdown sections
  - pymdownx.superfences      # Required for complex code blocks
  - pymdownx.inlinehilite     # Allows syntax highlighting on single inline words
  - pymdownx.tasklist:        # Checkboxes for to-do lists
      custom_checkbox: true
  - pymdownx.highlight:       # The actual syntax highlighting engine
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.arithmatex:      # Renders complex math and Big-O notation
      generic: true
